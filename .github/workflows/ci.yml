name: CI Pipeline

on:
  push:
    branches: [ main, github-actions, ecs-deploy-tags-not-latest ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  APP_NAME: python-demo-app
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  AWS_REGION: us-east-1
  ECS_CLUSTER: python-demo-cluster
  ECS_SERVICE: python-demo-app

jobs:
  notify-start:
    name: Notify Build Start
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Notify Slack - Build Started
        uses: slackapi/slack-github-action@v2.1.1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            text: "🛠️ Build #${{ github.run_number }} started for ${{ github.repository }}"
            blocks:
              - type: "section"
                text:
                  type: "mrkdwn"
                  text: "🛠️ *Build Started*\n*Repository:* ${{ github.repository }}\n*Branch:* `${{ github.ref_name }}`\n*Build:* #${{ github.run_number }}\n*Commit:* `${{ github.sha }}`\n*Link:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Workflow>"

  lint:
    name: Lint (Ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run linting with Ruff
        run: |
          ruff check .

  security:
    name: Security Scan (Bandit)
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run security scan with Bandit
        run: |
          bandit -r . -c bandit.yml

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with pytest
        run: |
          pytest test_app.py -v --junitxml=test-results.xml

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: test-results.xml

  build-and-push:
    name: Build and Push Docker Image to ECR
    runs-on: ubuntu-latest
    needs: [lint, security, test]
    outputs:
      image-uri: ${{ steps.set-image-uri.outputs.image-uri }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image to ECR
        id: build-image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/python-demo-app:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/python-demo-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set image URI for deployment
        run: echo "image-uri=${{ steps.login-ecr.outputs.registry }}/python-demo-app:${{ github.sha }}" >> $GITHUB_OUTPUT
        id: set-image-uri

  build-and-push-ghcr:
    name: Build and Push Docker Image to GHCR
    runs-on: ubuntu-latest
    needs: [lint, security, test]
    if: github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image to GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-to-ecs:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions: {}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create task definition revision with SHA image
        id: register-task-def
        env:
          IMAGE_URI: ${{ needs.build-and-push.outputs.image-uri }}
        run: |
          set -euo pipefail

          echo "Preparing deployment for image: $IMAGE_URI"

          CURRENT_TASK_DEF_ARN=$(aws ecs describe-services \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --services "${{ env.ECS_SERVICE }}" \
            --region "${{ env.AWS_REGION }}" \
            --query 'services[0].taskDefinition' \
            --output text)

          aws ecs describe-task-definition \
            --task-definition "$CURRENT_TASK_DEF_ARN" \
            --region "${{ env.AWS_REGION }}" \
            --query 'taskDefinition' > task-definition.json

          jq --arg IMAGE_URI "$IMAGE_URI" --arg CONTAINER_NAME "${{ env.APP_NAME }}" '
            del(
              .taskDefinitionArn,
              .revision,
              .status,
              .requiresAttributes,
              .compatibilities,
              .registeredAt,
              .registeredBy
            )
            | .containerDefinitions = (
                .containerDefinitions
                | map(if .name == $CONTAINER_NAME then .image = $IMAGE_URI else . end)
              )
          ' task-definition.json > task-definition-new.json

          NEW_TASK_DEF_ARN=$(aws ecs register-task-definition \
            --region "${{ env.AWS_REGION }}" \
            --cli-input-json file://task-definition-new.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "task-definition-arn=$NEW_TASK_DEF_ARN" >> "$GITHUB_OUTPUT"

      - name: Update ECS service to new task definition
        run: |
          aws ecs update-service \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --service "${{ env.ECS_SERVICE }}" \
            --task-definition "${{ steps.register-task-def.outputs.task-definition-arn }}" \
            --force-new-deployment \
            --region "${{ env.AWS_REGION }}"

      - name: Wait for ECS service stability
        run: |
          aws ecs wait services-stable \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --services "${{ env.ECS_SERVICE }}" \
            --region "${{ env.AWS_REGION }}"

  notify-end:
    name: Notify Build Complete
    runs-on: ubuntu-latest
    needs: [lint, security, test, build-and-push, build-and-push-ghcr, deploy-to-ecs]
    permissions: {}
    if: always()
    steps:
      - name: Notify Slack - Build Success
        if: ${{ !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') }}
        uses: slackapi/slack-github-action@v2.1.1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            text: "✅ Build #${{ github.run_number }} succeeded for ${{ github.repository }}"
            blocks:
              - type: "section"
                text:
                  type: "mrkdwn"
                  text: "✅ *Build Succeeded*\n*Repository:* ${{ github.repository }}\n*Branch:* `${{ github.ref_name }}`\n*Build:* #${{ github.run_number }}\n*Commit:* `${{ github.sha }}`\n*Link:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Workflow>"

      - name: Notify Slack - Build Failure
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        uses: slackapi/slack-github-action@v2.1.1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            text: "🚨 Build #${{ github.run_number }} failed for ${{ github.repository }}"
            blocks:
              - type: "section"
                text:
                  type: "mrkdwn"
                  text: "🚨 *Build Failed*\n*Repository:* ${{ github.repository }}\n*Branch:* `${{ github.ref_name }}`\n*Build:* #${{ github.run_number }}\n*Commit:* `${{ github.sha }}`\n*Link:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Workflow>"
