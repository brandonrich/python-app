AWSTemplateFormatVersion: '2010-09-09'
Description: 'Security Groups for ECS in Existing VPC'

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: Existing VPC ID

  AppPort:
    Type: Number
    Default: 5001
    Description: Port the application listens on

Resources:
  # ============== Security Groups ==============
  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: python-demo-alb-sg
      GroupDescription: Security group for ALB
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: Allow HTTP from anywhere
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: Allow HTTPS from anywhere
      Tags:
        - Key: Name
          Value: python-demo-alb-sg

  ECSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: python-demo-ecs-sg
      GroupDescription: Security group for ECS tasks
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: !Ref AppPort
          ToPort: !Ref AppPort
          SourceSecurityGroupId: !Ref ALBSecurityGroup
          Description: Allow traffic from ALB only
      Tags:
        - Key: Name
          Value: python-demo-ecs-sg

Outputs:
  ALBSecurityGroupId:
    Value: !Ref ALBSecurityGroup
    Export:
      Name: python-demo-alb-sg
    Description: Security group ID for ALB

  ECSSecurityGroupId:
    Value: !Ref ECSSecurityGroup
    Export:
      Name: python-demo-ecs-sg
    Description: Security group ID for ECS tasks
