AWSTemplateFormatVersion: '2010-09-09'
Description: 'ECS Service, Task Definition, and IAM Roles - References existing ALB'

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: Existing VPC ID

  PublicSubnet1Id:
    Type: AWS::EC2::Subnet::Id
    Description: First public subnet for ECS tasks

  PublicSubnet2Id:
    Type: AWS::EC2::Subnet::Id
    Description: Second public subnet for ECS tasks

  ECSSecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
    Description: Security group for ECS tasks

  ECSClusterName:
    Type: String
    Description: Name of the ECS cluster
    Default: python-demo-cluster

  ImageUri:
    Type: String
    Description: Docker image URI from ECR (e.g., 123456789.dkr.ecr.us-east-1.amazonaws.com/python-demo-app:latest)

  ServiceName:
    Type: String
    Default: python-demo-app
    Description: Name of the ECS service

  ContainerPort:
    Type: Number
    Default: 5001
    Description: Port the container listens on

  DesiredCount:
    Type: Number
    Default: 1
    Description: Number of ECS tasks to run (start with 1 for debugging)

  TaskCpu:
    Type: String
    Default: 256
    AllowedValues: ['256', '512', '1024', '2048', '4096']
    Description: CPU units for the task

  TaskMemory:
    Type: String
    Default: 512
    AllowedValues: ['512', '1024', '2048', '3072', '4096', '5120', '6144', '7168', '8192']
    Description: Memory (MB) for the task

  TargetGroupArn:
    Type: String
    Description: ARN of the target group from the ALB stack

Resources:
  # ============== IAM Roles ==============
  ECSTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: ECRAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                  - ecr:BatchGetImage
                  - ecr:GetDownloadUrlForLayer
                Resource: '*'
        - PolicyName: CloudWatchLogs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/ecs/python-demo-app:*'

  ECSTaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: ApplicationPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: '*'

  # ============== ECS Task Definition ==============
  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: python-demo-app
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      Cpu: !Ref TaskCpu
      Memory: !Ref TaskMemory
      ExecutionRoleArn: !GetAtt ECSTaskExecutionRole.Arn
      TaskRoleArn: !GetAtt ECSTaskRole.Arn
      ContainerDefinitions:
        - Name: python-demo-app
          Image: !Ref ImageUri
          PortMappings:
            - ContainerPort: !Ref ContainerPort
              Protocol: tcp
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: /ecs/python-demo-app
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs
          Environment:
            - Name: FLASK_ENV
              Value: production
            - Name: FLASK_APP
              Value: app.py

  # ============== ECS Service ==============
  ECSService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: !Ref ServiceName
      Cluster: !Ref ECSClusterName
      TaskDefinition: !Ref TaskDefinition
      DesiredCount: !Ref DesiredCount
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          Subnets:
            - !Ref PublicSubnet1Id
            - !Ref PublicSubnet2Id
          SecurityGroups:
            - !Ref ECSSecurityGroupId
      LoadBalancers:
        - ContainerName: python-demo-app
          ContainerPort: !Ref ContainerPort
          TargetGroupArn: !Ref TargetGroupArn
      HealthCheckGracePeriodSeconds: 120
      DeploymentConfiguration:
        MaximumPercent: 200
        MinimumHealthyPercent: 100
        DeploymentCircuitBreaker:
          Enable: false
          Rollback: false
      Tags:
        - Key: Name
          Value: python-demo-ecs-service

 

Outputs:
  ECSServiceName:
    Value: !Ref ServiceName
    Description: Name of the ECS service

  TaskDefinitionArn:
    Value: !Ref TaskDefinition
    Description: ARN of the task definition
